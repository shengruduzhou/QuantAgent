name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Upgrade packaging tools
        run: python -m pip install --upgrade pip wheel setuptools
      - name: Install package and test dependencies
        run: python -m pip install -e ".[test]"
      - name: Compile
        run: python -m compileall -q src services scripts
      - name: Test
        shell: bash
        run: |
          set -o pipefail
          python -m pytest tests/ -q --junitxml=pytest-results.xml 2>&1 | tee pytest.log
      - name: Upload pytest diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-diagnostics
          path: |
            pytest-results.xml
            pytest.log
          if-no-files-found: error
          retention-days: 14

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/quant-ui
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: false
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22.12.0"
          cache: "npm"
          cache-dependency-path: apps/quant-ui/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Typecheck
        shell: bash
        run: |
          set -o pipefail
          npm run typecheck 2>&1 | tee typecheck.log
      - name: Upload TypeScript diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-typecheck-diagnostics
          path: apps/quant-ui/typecheck.log
          if-no-files-found: error
          retention-days: 14
      - name: MonitorTable component tests
        shell: bash
        run: |
          set -o pipefail
          npm test -- --run src/components/MonitorTable.test.tsx 2>&1 | tee monitor-table-test.log
      - name: Upload MonitorTable diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: monitor-table-test-diagnostics
          path: apps/quant-ui/monitor-table-test.log
          if-no-files-found: error
          retention-days: 14
      - name: Workstation UX regression tests
        shell: bash
        run: |
          set -o pipefail
          npm test -- --run \
            src/components/AppShell.test.tsx \
            src/components/CandlestickChart.test.tsx \
            src/pages/BacktestLabPage.test.tsx \
            src/pages/FactorCenterPage.test.tsx \
            src/pages/HelpCenterPage.test.tsx \
            src/pages/SettingsPage.test.tsx \
            src/pages/VnpyParityPage.test.tsx \
            2>&1 | tee workstation-ux-test.log
      - name: Upload workstation UX diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: workstation-ux-test-diagnostics
          path: apps/quant-ui/workstation-ux-test.log
          if-no-files-found: error
          retention-days: 14
      - name: Unit and component tests
        run: npm test -- --run
      - name: Production build
        run: npm run build:vite
