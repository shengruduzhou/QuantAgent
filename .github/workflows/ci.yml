name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Upgrade packaging tools
        run: python -m pip install --upgrade pip wheel setuptools
      - name: Install package and test dependencies
        run: python -m pip install -e ".[test]"
      - name: Compile
        run: python -m compileall -q src services scripts
      - name: Test
        shell: bash
        run: |
          set -o pipefail
          python -m pytest tests/ -q --junitxml=pytest-results.xml 2>&1 | tee pytest.log
      - name: Upload pytest diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-diagnostics
          path: |
            pytest-results.xml
            pytest.log
          if-no-files-found: error
          retention-days: 14
