version: v7
safety:
  live_trading_enabled: false
  dry_run: true
  virtual_broker_only: true
  agents_can_emit_orders: false
  optimizer_output: target_weights
  order_intent_owner: OrderManager
  require_risk_gate_before_execution: true
  require_kill_switch_before_execution: true
  require_reconciliation_before_broker_submit: true
data:
  point_in_time_required: true
  max_prediction_horizon_days: 126
  supported_horizons_days: [1, 5, 20, 60, 120, 126]
  provider_mode: strict_local
  allow_synthetic_fallback: false
  allow_network: false
  v7_root: data/v7
  fundamentals_root: data/v7/fundamentals
  required_tables: [policies, base_universe, market_state, market_panel, fundamentals]
  enforce_pit_fundamentals: true
  use_financial_cache: true
  policy_urls: []
  news_urls: []
  disclosure_urls: []
  tradingview_urls: []
  qlib_provider_uri:
  qlib_region: cn
fundamentals_pipeline:
  primary_provider: tushare
  fallback_provider: akshare
  available_lag_days: 1
  cache_format: parquet
  growth_lookback_periods: 1
  cap_extreme_quantile: 0.99
policy_extraction:
  enabled: true
  endpoint: https://api.openai.com/v1/chat/completions
  model: gpt-4.1-mini
  api_key_env: OPENAI_API_KEY
llm_skills:
  enabled: true
  allow_network: false  # set to true at runtime to call the API; defaults to dry-run
  endpoint: https://api.openai.com/v1/chat/completions
  model: gpt-4.1-mini
  api_key_env: OPENAI_API_KEY
  timeout_seconds: 30.0
  max_input_chars: 16000
  temperature: 0.0
  enabled_skills:
    policy_analyst: true
    industry_chain_reasoner: true
    news_credibility_agent: true
    sentiment_agent: true
    valuation_agent: true
    financial_forensics_agent: true
    economics_agent: true
industry_chain_reasoner:
  use_dynamic_reasoner: true
  use_llm_refinement: true
  min_evidence_count_for_node: 1
  min_evidence_count_for_strong_edge: 2
  weak_association_max_evidence: 1
  strict_no_template_fallback: true
factor_applicability:
  hard_gate: true
  production_stages: [production, validation]
stock_pool_gate:
  enabled: true
  allow_satellite_if_confidence_above: 0.75
  require_factor_coverage: true
  block_false_association: true
alpha_model:
  enabled: true
  model: ridge
  alpha: 1.0
  l1_ratio: 0.5
  min_train_rows: 30
  fraud_penalty_weight: 0.30
retail_hedge_feasibility:
  enabled: true
  can_short_individual_stock: false
  can_short_index_futures: false
  can_trade_options: false
  can_buy_etf_inverse: true
  can_hold_cash: true
  can_reduce_gross_exposure: true
  allow_intraday_hedge: false
  margin_account: false
walk_forward_sleeve_allocator:
  enabled: true
  walk_forward_splits: 4
  embargo_days: 5
  min_window_days: 40
  grid_step: 0.05
  drawdown_penalty: 0.50
  cash_floor: 0.10
long_horizon_factors:
  enabled: true
  fraud_haircut_threshold: 60.0
  fraud_haircut_strength: 0.50
  policy_decay_half_life_days: 90.0
intrinsic_valuation:
  enabled: true
  default_terminal_growth: 0.025
  default_forecast_years: 5
  fraud_confidence_haircut_threshold: 60.0
  fraud_confidence_haircut_strength: 0.60
economic_analyzer:
  enabled: true
  capacity_utilization_target: 0.80
  inventory_days_warning: 90.0
retail_hft_risk:
  enabled: true
  base_penalty: 0.20
  max_penalty: 0.85
  institutional_volume_zscore_warning: 2.0
deep_alpha_model:
  enabled: false
  hidden_size: 16
  seed: 1729
  use_torch_if_available: true
  fraud_penalty_weight: 0.30
long_short_allocator:
  enabled: true
  long_horizon_confidence_threshold: 0.45
  short_horizon_confidence_threshold: 0.55
  hedge_scale: 0.30
  bind_to_portfolio: true
tool_hedge:
  enabled: true
  benchmark_symbol: 000300.SH
  target_beta: 0.30
  max_total_hedge_weight: 0.25
news_cross_validation:
  enabled: true
  rumour_keywords: [传闻, 据传, 据悉, 未经证实, 市场传言, 传言]
lifecycle_trading_rules:
  enabled: true
ingestion:
  enabled: true
  cache_root: data/v7/evidence
  store_root: data/v7/evidence/store
  write_to_store: true
  available_lag_days: 1
  enabled_sources: [policy, disclosure, news, financial, order_contract, regulatory_penalty]
  policy:
    urls: []
    allow_network: false
    active_discovery: true
    max_articles_per_source: 25
  disclosure:
    allow_network: false
    active_discovery: true
    max_articles_per_source: 25
  news:
    urls: []
    allow_network: false
    active_discovery: true
    max_articles_per_source: 25
  source_registry: []
evidence:
  min_source_reliability_for_trade_signal: 0.5
  min_cross_validation_count_for_core_pool: 2
  stale_theme_revalidation_days: 20
agents:
  policy_agent: enabled
  theme_discovery_agent: enabled
  industry_chain_graph_agent: enabled
  thematic_universe_builder: enabled
  fundamental_due_diligence_agent: enabled
  valuation_agent: enabled
  financial_fraud_risk_agent: enabled
  news_credibility_agent: enabled
  sentiment_agent: enabled
  market_regime_agent: enabled
  sector_rotation_agent: enabled
  factor_applicability_agent: enabled
  multi_horizon_alpha_agent: enabled
  technical_timing_agent: enabled
  portfolio_construction_agent: enabled
  hedge_decision_agent: enabled
  ashare_execution_agent: enabled
  risk_gate_agent: enabled
  backtest_attribution_agent: enabled
  audit_agent: enabled
portfolio:
  sleeves:
    long_fundamental: 0.25
    medium_theme: 0.30
    short_event: 0.10
    sector_rotation: 0.10
    hedge: 0.05
    cash_buffer: 0.20
  max_single_name_weight: 0.06
  max_sector_weight: 0.30
  max_theme_weight: 0.35
  max_turnover: 0.35
risk:
  high_fraud_risk_block_threshold: 80
  medium_fraud_risk_reduce_threshold: 60
  high_bubble_risk_reduce_threshold: 0.75
  min_liquidity_score: 25
  max_model_uncertainty: 0.70
execution:
  market: ashare
  lot_size: 100
  t_plus_one: true
  block_buy_limit_up: true
  block_sell_limit_down: true
  block_suspended: true
  block_st: true
  volume_participation_cap: 0.10
  next_bar_execution: true
audit:
  write_evidence_hashes: true
  write_agent_contribution: true
  write_risk_gate_result: true
