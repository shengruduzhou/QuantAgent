market:
  region: CN
  universe: CSI300
  benchmark: 000300.SH
  mode: long_only_enhancement

safety:
  live_trading_enabled: false
  dry_run: true
  require_kill_switch: true
  require_reconciliation: true

data:
  point_in_time: true
  cache_dir: data/cache
  event_cutoff: "15:00:00"

features:
  enable_alpha101: true
  enable_cicc_high_freq: true
  enable_sector_rotation: true
  enable_fund_flow: true
  enable_event_policy: true

model:
  architecture: v4_multitower
  sequence_backbone: itransformer
  snapshot_backbone: tabular_resnet
  event_backbone: structured_event_tower
  hidden_dim: 64
  dropout: 0.1
  quantiles: [0.1, 0.9]

training:
  batch_size: 64
  epochs: 3
  device: cpu
  use_amp: false
  walk_forward: true
  purged_cv: true
  embargo_days: 5

portfolio:
  max_name_weight: 0.05
  max_sector_weight: 0.30
  max_turnover: 0.30
  target_beta: 1.0
  cost_aware: true

execution:
  broker: qmt
  dry_run: true
  idempotency: true
  audit_log_dir: logs/execution
